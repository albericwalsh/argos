{% extends "base.html" %}
{% block content %}

<style>
  .account-card {
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .account-card h3 {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .account-field { margin-bottom: 14px; }
  .account-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
    display: block;
  }
  .account-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    transition: border-color .15s;
    box-sizing: border-box;
  }
  .account-input:focus { border-color: var(--accent); }
  .account-input[readonly] { color: var(--muted); cursor: not-allowed; }
  .account-alert {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; border-radius: 3px;
    font-family: var(--font-mono); font-size: 11px;
    margin-bottom: 14px;
  }
  .account-alert.error   { background: rgba(255,77,77,.08); border: 1px solid rgba(255,77,77,.25); color: #ff4d4d; }
  .account-alert.success { background: rgba(0,229,160,.08); border: 1px solid rgba(0,229,160,.25); color: var(--accent); }
</style>

<div class="page-header">
  <div>
    <div class="page-title">Mon compte</div>
    <div class="page-sub">{{ profile.username }}</div>
  </div>
</div>

<!-- Profil -->
<div class="account-card">
  <h3>Profil</h3>
  <div id="profile-alert"></div>

  <div class="account-field">
    <label class="account-label">Identifiant</label>
    <input class="account-input" type="text" value="{{ profile.username }}" readonly>
  </div>
  <div class="account-field">
    <label class="account-label">Nom d'affichage</label>
    <input class="account-input" type="text" id="display-name" value="{{ profile.display_name }}">
  </div>
  <div class="account-field">
    <label class="account-label">Email</label>
    <input class="account-input" type="email" id="email" value="{{ profile.email }}" placeholder="(optionnel)">
  </div>

  <button class="btn btn-primary" style="margin-top:6px" onclick="saveProfile()">Enregistrer</button>
</div>

<!-- Mot de passe -->
<div class="account-card">
  <h3>Mot de passe</h3>
  <div id="password-alert"></div>

  <div class="account-field">
    <label class="account-label">Mot de passe actuel</label>
    <input class="account-input" type="password" id="current-password" autocomplete="current-password">
  </div>
  <div class="account-field">
    <label class="account-label">Nouveau mot de passe</label>
    <input class="account-input" type="password" id="new-password" autocomplete="new-password">
  </div>
  <div class="account-field">
    <label class="account-label">Confirmer le nouveau mot de passe</label>
    <input class="account-input" type="password" id="confirm-password" autocomplete="new-password">
  </div>

  <button class="btn btn-primary" style="margin-top:6px" onclick="changePassword()">Changer le mot de passe</button>
</div>

<script>
function showAlert(containerId, msg, type) {
  const el = document.getElementById(containerId);
  el.innerHTML = `<div class="account-alert ${type}">${type === 'error' ? '✕' : '✓'} ${msg}</div>`;
  setTimeout(() => { el.innerHTML = ''; }, 4000);
}

async function saveProfile() {
  const display_name = document.getElementById('display-name').value.trim();
  const email = document.getElementById('email').value.trim();

  if (!display_name) return showAlert('profile-alert', 'Le nom d\'affichage ne peut pas être vide', 'error');

  try {
    const res = await fetch('/account/profile', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ display_name, email }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erreur');
    showAlert('profile-alert', 'Profil mis à jour', 'success');
  } catch (e) {
    showAlert('profile-alert', e.message, 'error');
  }
}

async function changePassword() {
  const current_password = document.getElementById('current-password').value;
  const new_password = document.getElementById('new-password').value;
  const confirm_password = document.getElementById('confirm-password').value;

  if (!current_password || !new_password) return showAlert('password-alert', 'Tous les champs sont requis', 'error');
  if (new_password.length < 8) return showAlert('password-alert', 'Le nouveau mot de passe doit faire au moins 8 caractères', 'error');
  if (new_password !== confirm_password) return showAlert('password-alert', 'Les mots de passe ne correspondent pas', 'error');

  try {
    const res = await fetch('/account/password', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ current_password, new_password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erreur');
    showAlert('password-alert', 'Mot de passe changé avec succès', 'success');
    document.getElementById('current-password').value = '';
    document.getElementById('new-password').value = '';
    document.getElementById('confirm-password').value = '';
  } catch (e) {
    showAlert('password-alert', e.message, 'error');
  }
}
</script>

{% endblock %}
