{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div>
    <div class="page-title">Missions</div>
    <div class="page-sub">Historique complet des exécutions</div>
  </div>
  <button class="btn btn-ghost">Exporter CSV</button>
</div>

<div class="card">
  <div class="card-header">
    <div class="card-title"><div class="card-title-dot blue"></div> <span id="mission-count">…</span> mission(s)</div>
  </div>
  <div class="card-body" style="padding:0">
    <table class="data-table">
      <thead><tr>
        <th>ID</th><th>Nom</th><th>Workflow</th><th>Créé par</th><th>Statut</th><th>Créée</th><th>Durée</th><th></th>
      </tr></thead>
      <tbody id="missions-tbody">
        <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">
          <span class="mini-spinner"></span> Déchiffrement de l'historique…
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
.data-table tr[data-clickable]:hover td { background: rgba(255,255,255,.025); cursor: pointer; }
.mini-spinner {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid rgba(0,229,160,.2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite; margin-right: 6px;
  vertical-align: middle;
}
</style>

<script>
// Missions en cours injectées directement (état mémoire process, non chiffré sur disque)
const LIVE_MISSIONS = {{ live_missions_json | tojson }};

function badgeFor(status) {
  if (status === 'completed') return '<span class="badge badge-success">Succès</span>';
  if (status === 'running')   return `<span class="badge badge-running">
      <span style="display:inline-block;width:7px;height:7px;border:1.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;margin-right:5px;vertical-align:middle"></span>
      En cours</span>`;
  if (status === 'failed')    return '<span class="badge badge-error">Erreur</span>';
  return `<span class="badge badge-pending">${status}</span>`;
}

function fmtDuration(m) {
  if (m.status === 'running') {
    return `<span class="live-duration" data-start="${m.date_created}">…</span>`;
  }
  if (m.date_completed && m.date_created) {
    const d1 = new Date(m.date_created), d2 = new Date(m.date_completed);
    const secs = Math.floor((d2 - d1) / 1000);
    return `${Math.floor(secs/60)}m ${secs%60}s`;
  }
  return '—';
}

function fmtDate(iso) {
  return (iso || '').slice(0, 16).replace('T', ' ');
}

function renderRow(m) {
  const cleanId = (m.id || '').replace('#', '');
  const canReport = m.status === 'completed';
  const folderParam = m._mission_folder ? `?folder=${encodeURIComponent(m._mission_folder)}` : '';
  // Les missions encore en mémoire de session (LIVE_MISSIONS) n'ont pas
  // d'owner_username injecté par le listing API ; on retombe sur "—".
  const ownerLabel = m._owner_username || '—';
  return `
    <tr data-clickable onclick="window.location='/missions/${cleanId}${folderParam}'">
      <td class="mono">${m.id}</td>
      <td>${m.name}</td>
      <td class="mono">${m.workflow}</td>
      <td class="dim">${ownerLabel}</td>
      <td>${badgeFor(m.status)}</td>
      <td class="dim">${fmtDate(m.date_created)}</td>
      <td class="dim">${fmtDuration(m)}</td>
      <td style="text-align:right;white-space:nowrap">
        ${canReport ? `
        <button class="btn btn-ghost" style="font-size:11px;padding:4px 10px"
                data-mission-id="${m.id}"
                data-mission-folder="${m._mission_folder || ''}"
                onclick="event.stopPropagation();generateReportFor(this)">
          ⎙ Rapport
        </button>` : ''}
        <a href="/missions/${cleanId}${folderParam}" class="btn btn-ghost" style="font-size:11px;padding:4px 10px"
           onclick="event.stopPropagation()">Détail →</a>
      </td>
    </tr>`;
}

async function generateReportFor(btn) {
  const missionId     = btn.dataset.missionId;
  const missionFolder = btn.dataset.missionFolder;

  btn.disabled = true;
  const originalText = btn.textContent;
  btn.textContent = '…';

  try {
    const res = await fetch('/reports/generate', {
      method:      'POST',
      credentials: 'same-origin',
      headers:     { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        mission_id:     missionId,
        mission_folder: missionFolder || undefined,
      }),
    });
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || 'Erreur serveur');

    btn.textContent = '✓ Généré';
    setTimeout(() => { window.location = '/reports'; }, 600);
  } catch (e) {
    btn.disabled = false;
    btn.textContent = originalText;
    alert(`Échec de la génération du rapport : ${e.message}`);
  }
}

function startLiveDurations() {
  document.querySelectorAll('.live-duration').forEach(el => {
    const start = new Date(el.dataset.start);
    setInterval(() => {
      const secs = Math.floor((Date.now() - start) / 1000);
      el.textContent = `${Math.floor(secs/60)}m ${secs%60}s`;
    }, 1000);
  });
}

async function loadMissionHistory() {
  const tbody = document.getElementById('missions-tbody');
  const liveIds = new Set(LIVE_MISSIONS.map(m => m.id));
  let history = [];

  try {
    // { mission_name: [ {name, original_name, size}, ... ] }
    const missionsMap = await ArgosDecrypt.listMissions();

    for (const [missionFolder, files] of Object.entries(missionsMap)) {
      for (const f of files) {
        try {
          const data = await ArgosDecrypt.fetchMissionJSON(missionFolder, f.name);
          // Conserve le dossier d'origine : nécessaire pour générer un
          // rapport depuis l'historique (le serveur doit savoir où aller
          // chercher et déchiffrer le fichier via l'API, faute de quoi
          // seules les missions encore en mémoire de session pourraient
          // avoir un rapport généré).
          data._mission_folder = missionFolder;
          data._mission_file   = f.name;
          // f vient du listing /proxy/files/missions et contient déjà
          // owner_username (résolu côté API depuis owner_id — info de
          // traçabilité non sensible) ; on l'attache pour l'affichage.
          data._owner_username = f.owner_username || null;
          if (!liveIds.has(data.id)) history.push(data);
        } catch (e) {
          console.error(`Échec déchiffrement ${missionFolder}/${f.name}`, e);
        }
      }
    }
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:#ff4d4d">
      Erreur de chargement : ${e.message}</td></tr>`;
    return;
  }

  const all = [...LIVE_MISSIONS, ...history];
  document.getElementById('mission-count').textContent = all.length;

  if (all.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">
      Aucune mission enregistrée</td></tr>`;
    return;
  }

  tbody.innerHTML = all.map(renderRow).join('');
  startLiveDurations();

  if (all.some(m => m.status === 'running')) {
    setTimeout(() => location.reload(), 5000);
  }
}

document.addEventListener('DOMContentLoaded', loadMissionHistory);
</script>

{% endblock %}
