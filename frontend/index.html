<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Argos - Pentest Toolbox</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="Interface front-end pour Argos - boîte à outils pentest" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">ARGOS</div>
      <nav>
        <ul>
          <li data-module="nmap" class="active">Nmap</li>
          <li data-module="ffuf">FFUF</li>
          <li data-module="workflows">Workflows</li>
        </ul>
      </nav>
      <div class="footer">Boîte à outils Pentest</div>
    </aside>

    <main class="main">
      <header>
        <h1 id="title">Nmap</h1>
        <div class="controls">
          <input id="target" placeholder="ex: example.com ou 10.0.0.1" />
          <button id="run">Run</button>
        </div>
      </header>

      <section class="content" id="content">
        <div class="card" id="card-desc">Bienvenue dans Argos UI — sélectionnez un module.</div>
        <pre class="output" id="output">Prêt. Sélectionnez un module et lancez une commande.</pre>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
